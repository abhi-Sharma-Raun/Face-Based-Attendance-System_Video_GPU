<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console - AI Attendance</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="app-container">
        <a href="index.html" class="btn btn-secondary mb-4">⬅️ Back to Main Menu</a>
        
        <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
            <h2>🛡️ Master Infrastructure Administration</h2>
            <span class="badge badge-dark px-3 py-2">Role: System Admin</span>
        </div>

        <ul class="nav nav-pills mb-4" id="admin-tabs" role="tablist">
            <li class="nav-item"><a class="nav-link active" id="tab-add-teacher" data-toggle="pill" href="#pane-add-teacher">➕ Provision Faculty</a></li>
            <li class="nav-item"><a class="nav-link" id="tab-add-class" data-toggle="pill" href="#pane-add-class">🏛️ Initialize Classes</a></li>
        </ul>

        <div class="tab-content border p-4 bg-white rounded shadow-sm">
            <div class="tab-pane fade show active" id="pane-add-teacher">
                <h4>Provision New Teacher Identity</h4>
                <form id="form-add-teacher" class="form-grid">
                    <div class="form-group"><label class="font-weight-bold">Teacher Name</label><input type="text" id="teacher-name" class="form-control" placeholder="Prof. Miller" required></div>
                    <div class="form-group"><label class="font-weight-bold">Email Address</label><input type="email" id="teacher-email" class="form-control" placeholder="miller@campus.edu" required></div>
                    <div class="form-group full-width-field"><label class="font-weight-bold">Department Domain</label><input type="text" id="teacher-dept" class="form-control" placeholder="Computer Science" required></div>
                    <div class="form-group full-width-field mt-2"><button type="submit" class="btn btn-dark px-4">Register Faculty Profile</button></div>
                </form>
            </div>

            <div class="tab-pane fade" id="pane-add-class">
                <h4>Provision Operational Academic Class</h4>
                <form id="form-add-class" class="form-grid">
                    <div class="form-group"><label class="font-weight-bold">Class Unified Name</label><input type="text" id="class-name" class="form-control" placeholder="CS-Elective-A" required></div>
                    <div class="form-group"><label class="font-weight-bold">Batch Start Year</label><input type="number" id="class-start-year" class="form-control" placeholder="2025" required></div>
                    <div class="form-group"><label class="font-weight-bold">Current Academic Year</label><input type="number" id="class-curr-year" class="form-control" placeholder="3" required></div>
                    <div class="form-group"><label class="font-weight-bold">Course ID Identifier</label><input type="text" id="class-course-id" class="form-control" placeholder="CSE-302" required></div>
                    <div class="form-group"><label class="font-weight-bold">Department Code</label><input type="text" id="class-dept" class="form-control" placeholder="CSE" required></div>
                    <div class="form-group"><label class="font-weight-bold">Branch Division</label><input type="text" id="class-branch" class="form-control" placeholder="Section-1" required></div>
                    <div class="form-group full-width-field mt-2"><button type="submit" class="btn btn-dark px-4">Initialize System Class</button></div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
    <script type="module">
        import { initAdminPanel } from './src/panels/admin.js';
        window.addEventListener('DOMContentLoaded', initAdminPanel);
    </script>
</body>
</html>
